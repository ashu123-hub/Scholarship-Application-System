<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your ScholarHub account to apply for scholarships.">
  <title>Login — ScholarHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="/" class="nav-brand">
        <div class="nav-brand-icon">🎓</div>
        <span class="nav-brand-text">ScholarHub</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/#scholarships">Scholarships</a></li>
        <li><a href="/apply">Apply Now</a></li>
        <li><a href="/track">Track Status</a></li>
        <li><a href="/register" class="btn-nav">Register</a></li>
      </ul>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-card" id="authCard">

        <!-- Step 1: Login Form -->
        <div class="auth-step active" id="stepLogin">
          <div class="auth-header">
            <div class="nav-brand-icon" style="width: 56px; height: 56px; font-size: 1.6rem; margin: 0 auto 16px;">🔐</div>
            <h2>Welcome Back</h2>
            <p>Login to your ScholarHub account</p>
          </div>
          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <div class="password-wrapper">
                <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">👁️</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
              🔐 Login
            </button>
            <p class="auth-link">
              Don't have an account? <a href="/register">Create one here</a>
            </p>
          </form>
        </div>



        <!-- Success -->
        <div class="auth-step" id="stepLoginSuccess">
          <div class="auth-header">
            <div class="success-icon" style="margin-bottom: 20px;">✓</div>
            <h2>Login Successful!</h2>
            <p>Welcome back, <strong id="loginUserName">User</strong>!</p>
          </div>
          <div class="hero-buttons" style="justify-content: center; margin-top: 24px;">
            <a href="/apply" class="btn btn-primary">🚀 Apply for Scholarship</a>
            <a href="/" class="btn btn-secondary">🏠 Go to Home</a>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/auth.js"></script>
  <script>
    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });

    // Check if already logged in
    (async () => {
      try {
        const res = await fetch('/api/auth/check');
        if (res.ok) {
          const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
          window.location.href = redirect;
        }
      } catch(e) {}
    })();
  </script>
</body>
</html>
